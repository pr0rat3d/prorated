workflows:
  ios-app-store:
    name: ProRated iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.prorated
      vars:
        BUNDLE_ID: "app.prorated"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set build number
        script: |
          agvtool new-version -all 27
        working_directory: ios/App

      - name: Build iOS
        script: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>5ZD8684X8H</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>app.prorated</key>
                  <string>ProRated App Store</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/ProRated.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=5ZD8684X8H \
            PROVISIONING_PROFILE_SPECIFIER="ProRated App Store"

          xcodebuild \
            -exportArchive \
            -archivePath /tmp/ProRated.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Publish to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY" > /tmp/asc_key.p8
          app-store-connect publish \
            --path build/ios/ipa/App.ipa \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/ProRated.xcarchive/Products/Applications/*.app

  android-play-store:
    name: ProRated Android Play Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      android_signing:
        - prorated_keystore
      vars:
        PACKAGE_NAME: "app.prorated"
      node: 22.13.0
      java: 21

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync android

      - name: Set version code
        script: |
          cd android
          sed "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" app/build.gradle > app/build.gradle.tmp
          mv app/build.gradle.tmp app/build.gradle

      - name: Build Android release
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
